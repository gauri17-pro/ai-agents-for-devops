name: Build and Deploy EC2 Agent

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-run:
    runs-on: self-hosted

    steps:
      # ── 1. Checkout code ───────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v3

      # ── 2. Install Docker (only runs if Docker is not already installed) ───
      - name: Install Docker
        run: |
          if ! command -v docker &> /dev/null; then
            curl -fsSL https://get.docker.com | sh
            sudo usermod -aG docker ubuntu
            sudo systemctl start docker
            sudo systemctl enable docker
          else
            echo "Docker already installed, skipping"
          fi

      # ── 3. Deploy ──────────────────────────────────────────────────────────
      - name: Docker Compose Up
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          sudo docker compose down --remove-orphans || true
          sudo docker compose up -d --build

      # ── 4. Verify env inside container ────────────────────────────────────
      - name: Verify env inside container
        run: |
          sudo docker exec agent-app env | grep GROQ_API_KEY

      # ── 5. Verify containers are running ──────────────────────────────────
      - name: Verify deployment
        run: |
          sudo docker compose ps
          echo "App running at http://localhost:80"